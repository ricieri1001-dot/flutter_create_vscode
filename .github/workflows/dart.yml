name: Compilar Sandbox Flutter

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixar o código do repositório
      uses: actions/checkout@v3

    - name: 2. Configurar o Java (JDK 17 para Gradle moderno)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 3. Configurar o Flutter Framework
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: 4. Atualizar os pacotes do pubspec
      run: flutter pub get

    - name: 5. Compilar o APK e testar build.gradle
      run: flutter build apk --release

    - name: 6. Disponibilizar o APK gerado
      uses: actions/upload-artifact@v3
      with:
        name: Sandbox-APK
        path: build/app/outputs/flutter-apk/app-release.apk
